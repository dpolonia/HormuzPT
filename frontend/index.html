<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HormuzPT — Cenários Energéticos para Portugal</title>
    <meta name="description" content="Plataforma de modelação de cenários energéticos para Portugal — análise de impacto de um bloqueio do Estreito de Ormuz" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <div id="crash-log" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;background:#0F172A;color:#ef4444;padding:40px;font-family:monospace;white-space:pre-wrap;overflow:auto;"></div>
    <script>
      var crashLog = document.getElementById('crash-log');
      var errors = [];
      function showCrash(msg) {
        errors.push(msg);
        crashLog.style.display = 'block';
        crashLog.textContent = 'CRASH LOG\n=========\n\n' + errors.join('\n\n---\n\n');
      }
      window.onerror = function(msg, src, line, col, err) {
        showCrash('onerror: ' + msg + '\nat ' + src + ':' + line + ':' + col + '\n' + (err && err.stack || ''));
      };
      window.addEventListener('unhandledrejection', function(e) {
        showCrash('unhandledrejection: ' + (e.reason && e.reason.stack || e.reason || 'unknown'));
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
