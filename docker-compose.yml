# docker-compose.yml — Dev local para HormuzPT
# Uso: cd /home/dpolonia/HormuzPT && docker compose up
#
# O .env na raiz é automaticamente carregado pelo Docker Compose.

version: "3.9"

services:
  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    environment:
      - VITE_API_URL=http://localhost:8081
    depends_on:
      - api-proxy

  api-proxy:
    build: ./api-proxy
    ports:
      - "8081:8081"
    env_file: .env
    environment:
      - PORT=8081
      - NODE_ENV=development
      - GCS_BUCKET=${GCS_BUCKET:-hormuzpt-hormuz-cache}

  recalibrator:
    build: ./recalibrator
    ports:
      - "8082:8082"
    env_file: .env
    environment:
      - HORMUZ_ENV=development
      - GCS_BUCKET=${GCS_BUCKET:-hormuzpt-hormuz-cache}
    # Em dev, não executa automaticamente — invocar manualmente:
    # curl -X POST http://localhost:8082/recalibrate?dry_run=true
