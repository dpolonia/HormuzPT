services:
  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    env_file:
      - .env

  api-proxy:
    build: ./api-proxy
    ports:
      - "8081:8081"
    env_file:
      - .env

  recalibrator:
    build: ./recalibrator
    ports:
      - "8082:8082"
    env_file:
      - .env
